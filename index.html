    .custom-notification {
      position: fixed;
      left: 20px;
      bottom: 90px;
      color: #fff;
      padding: 12px 20px;
      border-radius: 4px;
      font-family: sans-serif;
      font-size: clamp(12px, 1.6vw, 14px);
      z-index: 9999;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.4s ease;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .custom-notification.show {
      opacity: 1;
      transform: translateY(0);
    }

    .custom-notification.verde {

    .custom-notification.azul {

  <script>

      'Nicolas', 'Ruan', 'Alberto', 'Rubens', 'Nilton', 'Augusto', 'Cleber', 'Osmar', 'Nilson', 'Hugo',
      'Otavio', 'Vinicios', 'Italo', 'Wilian', 'Alisson', 'Aparecido'

    const nomesFem = [
      'Maria', 'Ana', 'Francisca', 'Antonia', 'Adriana', 'Juliana', 'Marcia', 'Fernanda', 'Patricia', 'Aline',
      'Sandra', 'Camila', 'Amanda', 'Bruna', 'Jessica', 'Leticia', 'Julia', 'Luciana', 'Vanessa', 'Mariana',
      'Gabriela', 'Vera', 'Vitoria', 'Larissa', 'Claudia', 'Beatriz', 'Rita', 'Luana', 'Sonia', 'Renata', 'Eliane'
    ];

    function nomeAleatorio() {
      return Math.random() < 0.5
        ? nomesMasc[Math.floor(Math.random() * nomesMasc.length)]
        : nomesFem[Math.floor(Math.random() * nomesFem.length)];
    }

    function criarNotificacao(msg, cor) {
      const noti = document.createElement("div");
      noti.className = `custom-notification ${cor}`;

      const svgCheck = `
        <svg class="nmi" xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="40px" height="40px" version="1.1"
          style="shape-rendering:geometricPrecision; text-rendering:geometricPrecision; image-rendering:optimizeQuality; fill-rule:evenodd; clip-rule:evenodd"
          viewBox="0 0 40 40" xmlns:xlink="http://www.w3.org/1999/xlink">
          <defs>
            <style type="text/css">
              #Notiflix-Icon-Success{fill:rgba(0,0,0,0.2)}
            </style>
          </defs>
          <g>
            <path id="Notiflix-Icon-Success" d="M20 0c11.03,0 20,8.97 20,20 0,11.03 -8.97,20 -20,20 -11.03,0 -20,-8.97 -20,-20 0,-11.03 8.97,-20 20,-20zm0 37.98c9.92,0 17.98,-8.06 17.98,-17.98 0,-9.92 -8.06,-17.98 -17.98,-17.98 -9.92,0 -17.98,8.06 -17.98,17.98 0,9.92 8.06,17.98 17.98,17.98zm-2.4 -13.29l11.52 -12.96c0.37,-0.41 1.01,-0.45 1.42,-0.08 0.42,0.37 0.46,1 0.09,1.42l-12.16 13.67c-0.19,0.22 -0.46,0.34 -0.75,0.34 -0.23,0 -0.45,-0.07 -0.63,-0.22l-7.6 -6.07c-0.43,-0.35 -0.5,-0.99 -0.16,-1.42 0.35,-0.43 0.99,-0.5 1.42,-0.16l6.85 5.48z"></path>
          </g>
        </svg>
      `;

      const partes = msg.split(' ');
      noti.innerHTML = `${svgCheck}<strong>${partes[0]}</strong> ${partes.slice(1).join(' ')}`;

      document.body.appendChild(noti);

      setTimeout(() => noti.classList.add("show"), 100);
      setTimeout(() => {
        noti.classList.remove("show");
        setTimeout(() => {
          if (document.body.contains(noti)) {
            document.body.removeChild(noti);
          }
        }, 400);
      }, tempoExibicao);
    }

    const rodadas = [
      { wpp: 2, tg: 1 },
      { wpp: 5, tg: 2 },
      { wpp: 7, tg: 3 }
    ];

    let rodadaIndex = 0;
    let wppCount = 0;
    let tgCount = 0;

    function mostrarNotificacao() {
      const rodada = rodadas[rodadaIndex];

      if (wppCount < rodada.wpp) {
        criarNotificacao(`${nomeAleatorio()} ${frase} do WhatsApp`, 'verde');
        wppCount++;
      } else if (tgCount < rodada.tg) {
        criarNotificacao(`${nomeAleatorio()} ${frase} do Telegram`, 'azul');
        tgCount++;
      }

      if (wppCount >= rodada.wpp && tgCount >= rodada.tg) {
        rodadaIndex = (rodadaIndex + 1) % rodadas.length;
        wppCount = 0;
        tgCount = 0;
      }

      const proximo = Math.floor(Math.random() * (tempoMax - tempoMin + 1)) + tempoMin;
      setTimeout(mostrarNotificacao, proximo);
    }

    let vagas = 18;
    let intervaloMinimo = 15000;
    let intervaloMaximo = 25000;

    function atualizarVagas() {
      let variacao = Math.random();
      let decremento = 0;

      if (variacao < 0.3) decremento = 0;
      else if (variacao < 0.6) decremento = 1;
      else if (variacao < 0.8) decremento = 2;
      else decremento = 3;

      vagas = Math.max(vagas - decremento, 1);

      const vagasElement = document.getElementById('vagas-count');
      if (vagasElement) {
        vagasElement.textContent = vagas + ' ';
      }

      let intervaloAleatorio = Math.floor(Math.random() * (intervaloMaximo - intervaloMinimo + 1)) + intervaloMinimo;
      setTimeout(atualizarVagas, intervaloAleatorio);
    }

    document.addEventListener("DOMContentLoaded", function () {
      const slides = document.querySelectorAll(".bg-slide");

      if (slides.length > 0) {
        let currentIndex = 0;

        function showSlide(index) {
          slides.forEach((slide) => slide.classList.remove("active"));
          slides[index].classList.add("active");
        }

        showSlide(currentIndex);

        setInterval(() => {
          currentIndex = (currentIndex + 1) % slides.length;
          showSlide(currentIndex);
        }, 7000);
      }

      setTimeout(mostrarNotificacao, 4000);
      setTimeout(atualizarVagas, 15000);
    });
  </script>
